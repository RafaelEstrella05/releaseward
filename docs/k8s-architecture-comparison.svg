<svg viewBox="0 0 1300 820" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1300" height="820" fill="#ffffff"/>

  <!-- Title -->
  <text x="650" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">Production Kubernetes vs. this project's local simulation</text>
  <text x="650" y="53" text-anchor="middle" font-size="13" fill="#6b7280">Same Kubernetes concepts, different machine layout underneath</text>

  <!-- divider -->
  <line x1="650" y1="75" x2="650" y2="800" stroke="#e5e7eb" stroke-width="2"/>

  <!-- ============= LEFT: PRODUCTION ============= -->
  <text x="325" y="90" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a5f">Production cluster (real, separate machines)</text>

  <!-- Control plane machine -->
  <rect x="40" y="110" width="560" height="190" rx="10" fill="#eef2f7" stroke="#3b5c8f" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="60" y="132" font-size="13" font-weight="700" fill="#1e3a5f">Control-plane node — its own machine (VM or bare metal)</text>

  <rect x="58" y="142" width="524" height="20" rx="4" fill="#dbeafe" stroke="#2563eb"/>
  <text x="320" y="157" text-anchor="middle" font-size="11" fill="#1e40af">Docker / containerd — this machine's container runtime</text>

  <rect x="58" y="172" width="120" height="46" rx="6" fill="#fef3c7" stroke="#b45309"/>
  <text x="118" y="191" text-anchor="middle" font-size="11" font-weight="600" fill="#7c3400">API Server</text>
  <text x="118" y="205" text-anchor="middle" font-size="10" fill="#7c3400">(kubectl talks here)</text>

  <rect x="188" y="172" width="110" height="46" rx="6" fill="#fef3c7" stroke="#b45309"/>
  <text x="243" y="191" text-anchor="middle" font-size="11" font-weight="600" fill="#7c3400">Scheduler</text>
  <text x="243" y="205" text-anchor="middle" font-size="10" fill="#7c3400">places pods</text>

  <rect x="308" y="172" width="110" height="46" rx="6" fill="#fef3c7" stroke="#b45309"/>
  <text x="363" y="191" text-anchor="middle" font-size="11" font-weight="600" fill="#7c3400">etcd</text>
  <text x="363" y="205" text-anchor="middle" font-size="10" fill="#7c3400">cluster state</text>

  <rect x="428" y="172" width="154" height="46" rx="6" fill="#fef3c7" stroke="#b45309"/>
  <text x="505" y="191" text-anchor="middle" font-size="11" font-weight="600" fill="#7c3400">Controller Manager</text>
  <text x="505" y="205" text-anchor="middle" font-size="10" fill="#7c3400">reconciles desired state</text>

  <rect x="58" y="228" width="524" height="52" rx="6" fill="#f3f4f6" stroke="#6b7280"/>
  <text x="320" y="248" text-anchor="middle" font-size="11" fill="#374151">Usually no application pods scheduled here in production —</text>
  <text x="320" y="263" text-anchor="middle" font-size="11" fill="#374151">keeps control-plane isolated from workload crashes/load</text>

  <!-- network arrow between control plane and workers -->
  <line x1="320" y1="300" x2="320" y2="330" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <text x="335" y="319" font-size="10" fill="#475569">network (kubelet ⟷ API server)</text>

  <!-- Worker node 1 -->
  <rect x="40" y="335" width="270" height="230" rx="10" fill="#eef2f7" stroke="#3b5c8f" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="175" y="357" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a5f">Worker node 1 — separate machine</text>

  <rect x="56" y="367" width="238" height="20" rx="4" fill="#dbeafe" stroke="#2563eb"/>
  <text x="175" y="382" text-anchor="middle" font-size="10" fill="#1e40af">Docker / containerd</text>

  <rect x="56" y="395" width="238" height="30" rx="4" fill="#fef3c7" stroke="#b45309"/>
  <text x="175" y="415" text-anchor="middle" font-size="11" fill="#7c3400">kubelet + kube-proxy</text>

  <rect x="80" y="435" width="190" height="50" rx="6" fill="#dcfce7" stroke="#15803d"/>
  <text x="175" y="454" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">Pod</text>
  <text x="175" y="469" text-anchor="middle" font-size="10" fill="#14532d">app container(s)</text>

  <rect x="80" y="495" width="190" height="50" rx="6" fill="#dcfce7" stroke="#15803d"/>
  <text x="175" y="514" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">Pod</text>
  <text x="175" y="529" text-anchor="middle" font-size="10" fill="#14532d">app container(s)</text>

  <!-- Worker node 2 -->
  <rect x="330" y="335" width="270" height="230" rx="10" fill="#eef2f7" stroke="#3b5c8f" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="465" y="357" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a5f">Worker node 2 — separate machine</text>

  <rect x="346" y="367" width="238" height="20" rx="4" fill="#dbeafe" stroke="#2563eb"/>
  <text x="465" y="382" text-anchor="middle" font-size="10" fill="#1e40af">Docker / containerd</text>

  <rect x="346" y="395" width="238" height="30" rx="4" fill="#fef3c7" stroke="#b45309"/>
  <text x="465" y="415" text-anchor="middle" font-size="11" fill="#7c3400">kubelet + kube-proxy</text>

  <rect x="370" y="435" width="190" height="50" rx="6" fill="#dcfce7" stroke="#15803d"/>
  <text x="465" y="454" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">Pod</text>
  <text x="465" y="469" text-anchor="middle" font-size="10" fill="#14532d">app container(s)</text>

  <text x="465" y="510" text-anchor="middle" font-size="11" fill="#9ca3af" font-style="italic">...scale out: add</text>
  <text x="465" y="525" text-anchor="middle" font-size="11" fill="#9ca3af" font-style="italic">more worker machines</text>

  <text x="325" y="595" text-anchor="middle" font-size="12" fill="#374151">One node = one real machine. Kubernetes' processes run</text>
  <text x="325" y="612" text-anchor="middle" font-size="12" fill="#374151">directly on that machine's OS, next to its container runtime —</text>
  <text x="325" y="629" text-anchor="middle" font-size="12" fill="#374151">not nested inside another container.</text>

  <!-- ============= RIGHT: OUR SIMULATION ============= -->
  <text x="975" y="90" text-anchor="middle" font-size="16" font-weight="700" fill="#7c2d12">This project's simulation — WSL2 + k3d, one machine total</text>

  <!-- Windows host -->
  <rect x="680" y="110" width="580" height="600" rx="10" fill="#fafafa" stroke="#9ca3af" stroke-width="2"/>
  <text x="700" y="132" font-size="13" font-weight="700" fill="#374151">Windows host machine</text>

  <!-- WSL2 VM -->
  <rect x="695" y="145" width="550" height="545" rx="10" fill="#eef2f7" stroke="#3b5c8f" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="715" y="167" font-size="12" font-weight="700" fill="#1e3a5f">WSL2 Ubuntu VM — the ONE real machine we actually have</text>

  <rect x="710" y="177" width="520" height="24" rx="4" fill="#dbeafe" stroke="#2563eb"/>
  <text x="970" y="193" text-anchor="middle" font-size="11" fill="#1e40af">Docker daemon (cgroup driver: cgroupfs — the fix from Task 2)</text>

  <!-- serverlb -->
  <rect x="710" y="213" width="150" height="90" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="785" y="233" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">k3d-releaseward</text>
  <text x="785" y="246" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">-serverlb</text>
  <text x="785" y="264" text-anchor="middle" font-size="9" fill="#1e40af">Docker container</text>
  <text x="785" y="277" text-anchor="middle" font-size="9" fill="#1e40af">(nginx proxy)</text>
  <text x="785" y="290" text-anchor="middle" font-size="9" fill="#1e40af">ports 8080, 6443</text>

  <!-- server-0 outer container -->
  <rect x="880" y="213" width="340" height="450" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="1050" y="233" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">k3d-releaseward-server-0 — a Docker container</text>

  <!-- nested k3s -->
  <rect x="895" y="245" width="310" height="400" rx="8" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
  <text x="1050" y="266" text-anchor="middle" font-size="11" font-weight="700" fill="#7c3400">k3s process running inside — this ONE</text>
  <text x="1050" y="280" text-anchor="middle" font-size="11" font-weight="700" fill="#7c3400">container plays BOTH control-plane + worker</text>

  <rect x="912" y="292" width="130" height="40" rx="5" fill="#fde68a" stroke="#b45309"/>
  <text x="977" y="310" text-anchor="middle" font-size="10" fill="#7c3400">API Server</text>
  <text x="977" y="323" text-anchor="middle" font-size="9" fill="#7c3400">+ Scheduler + etcd</text>

  <rect x="1058" y="292" width="130" height="40" rx="5" fill="#fde68a" stroke="#b45309"/>
  <text x="1123" y="315" text-anchor="middle" font-size="10" fill="#7c3400">kubelet</text>

  <!-- nested containerd -->
  <rect x="912" y="345" width="276" height="30" rx="5" fill="#fde68a" stroke="#b45309"/>
  <text x="1050" y="365" text-anchor="middle" font-size="10" fill="#7c3400">containerd (nested — a 2nd container-runtime layer)</text>

  <!-- nested pod -->
  <rect x="940" y="390" width="220" height="60" rx="6" fill="#dcfce7" stroke="#15803d"/>
  <text x="1050" y="412" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">Pod: releaseward-demo</text>
  <text x="1050" y="427" text-anchor="middle" font-size="10" fill="#14532d">our Node+Express app container</text>

  <!-- nesting brace / callout -->
  <line x1="1200" y1="213" x2="1240" y2="213" stroke="#dc2626" stroke-width="2"/>
  <line x1="1240" y1="213" x2="1240" y2="663" stroke="#dc2626" stroke-width="2"/>
  <line x1="1200" y1="663" x2="1240" y2="663" stroke="#dc2626" stroke-width="2"/>
  <text x="1248" y="330" font-size="10" fill="#dc2626" font-weight="700" transform="rotate(90 1248 330)">3 nested layers:</text>

  <rect x="700" y="675" width="530" height="65" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="965" y="694" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">Docker → (k3s container) → containerd → Pod = 3 stacked layers</text>
  <text x="965" y="710" text-anchor="middle" font-size="10.5" fill="#991b1b">The outer Docker daemon had to create a cgroup scope for the whole</text>
  <text x="965" y="724" text-anchor="middle" font-size="10.5" fill="#991b1b">server-0 container — that's exactly what crash-looped until cgroupfs fixed it.</text>

  <text x="965" y="760" text-anchor="middle" font-size="12" fill="#374151">One physical machine total. Every "node" is faked by handing it its own</text>
  <text x="965" y="777" text-anchor="middle" font-size="12" fill="#374151">Docker container — cheap, but nested, with real tradeoffs.</text>

  <!-- Legend -->
  <g transform="translate(40,795)">
    <rect x="0" y="-10" width="14" height="14" rx="3" fill="#eef2f7" stroke="#3b5c8f" stroke-dasharray="4,2"/>
    <text x="20" y="1" font-size="10.5" fill="#374151">machine / VM boundary</text>
    <rect x="180" y="-10" width="14" height="14" rx="3" fill="#dbeafe" stroke="#2563eb"/>
    <text x="200" y="1" font-size="10.5" fill="#374151">Docker container</text>
    <rect x="330" y="-10" width="14" height="14" rx="3" fill="#fef3c7" stroke="#b45309"/>
    <text x="350" y="1" font-size="10.5" fill="#374151">Kubernetes component</text>
    <rect x="520" y="-10" width="14" height="14" rx="3" fill="#dcfce7" stroke="#15803d"/>
    <text x="540" y="1" font-size="10.5" fill="#374151">application Pod</text>
  </g>
</svg>
