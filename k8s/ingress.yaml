apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: releaseward-demo
spec:
  ingressClassName: traefik
  rules:
    - host: releaseward.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: releaseward-demo
                port:
                  number: 80
