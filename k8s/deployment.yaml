apiVersion: apps/v1
kind: Deployment
metadata:
  name: releaseward-demo
  labels:
    app: releaseward-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: releaseward-demo
  template:
    metadata:
      labels:
        app: releaseward-demo
    spec:
      containers:
        - name: releaseward-demo
          image: releaseward-demo:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          livenessProbe:
            httpGet:
              path: /livez
              port: 3000
            initialDelaySeconds: 2
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3000
            initialDelaySeconds: 1
            periodSeconds: 3
